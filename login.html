<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – LeafNest</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><span class="leaf">🌿</span><span>LeafNest</span></a>
  <div class="nav-right">
    <button class="cart-btn" onclick="location.href='cart.html'">🛒 Cart <span class="cart-count">0</span></button>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div style="font-size:2.5rem;text-align:center;margin-bottom:.5rem">🌿</div>
    <h2 style="text-align:center">Welcome Back</h2>
    <p style="text-align:center">Sign in to your LeafNest account</p>
    <div id="error-msg" style="background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:.88rem;margin-bottom:1rem;display:none"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div style="position:relative">
          <input type="password" id="password" placeholder="Enter your password" required style="padding-right:2.5rem;width:100%;box-sizing:border-box" />
          <span onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.1rem;user-select:none" id="eye1">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn-full">Sign In</button>
    </form>
    <div class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></div>
  </div>
</div>

<script src="data.js"></script>
<script>
  updateCartCount();
  function togglePass() {
    const inp = document.getElementById('password');
    const eye = document.getElementById('eye1');
    if (inp.type === 'password') { inp.type = 'text'; eye.textContent = '🙈'; }
    else { inp.type = 'password'; eye.textContent = '👁️'; }
  }
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error-msg');
    const btn      = this.querySelector('button[type=submit]');
    btn.textContent = 'Signing in...'; btn.disabled = true;

    const result = await loginUser(email, password);
    if (result.success) {
      localStorage.setItem('plantstore_current_user', JSON.stringify(result.user));
      const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
      location.href = redirect;
    } else {
      errEl.textContent = result.message || 'Invalid email or password.';
      errEl.style.display = 'block';
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
